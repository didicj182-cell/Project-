name: Build MaelSpeed V3 APK (Final Stable)
on: [push, workflow_dispatch]

jobs:
  build:
    # Pakai 22.04 karena paling stabil buat Buildozer + Kivy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Install alat rakit mesin APK lengkap
          sudo apt install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev zlib1g-dev libtool autoconf automake \
          pkg-config libltdl-dev libffi-dev libssl-dev openjdk-17-jdk

      - name: Extreme Auto-Fix Buildozer Spec
        run: |
          # 1. Bersihkan requirements yang ganda
          sed -i '/requirements =/d' buildozer.spec
          
          # 2. Potong paksa bagian bawah yang sering bikin error DuplicateOption
          sed -i '/\[buildozer\]/,$d' buildozer.spec
          
          # 3. Pasang ulang requirements yang pas di bawah [app]
          sed -i '/\[app\]/a requirements = python3,kivy==2.2.1,cython==0.29.33,yt-dlp,requests,sqlite3' buildozer.spec
          
          # 4. Setel API 33 dan Arsitektur modern
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/^log_level =.*/log_level = 2/' buildozer.spec
          
          # 5. Pasang kembali section [buildozer] yang bersih
          echo -e "\n[buildozer]\nlog_level = 2\nwarn_on_root = 1" >> buildozer.spec

      - name: Install Buildozer & Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          # Bersihkan sisa build gagal sebelumnya supaya tidak bau "bensin basi"
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists
          # Jalankan rakitan
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: MaelSpeed-V3-Final-APK
          path: bin/*.apk
          
