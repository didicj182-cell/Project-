name: Build MaelSpeed V3 APK (Auto-Fix)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev

      - name: Auto-Fix Buildozer Spec
        run: |
          # 1. Hapus SEMUA baris requirements yang ada di seluruh file (biar gak duplikat lagi)
          sed -i '/requirements =/d' buildozer.spec
          
          # 2. Pasang satu baris requirements yang bener tepat di bawah tag [app]
          sed -i '/\[app\]/a requirements = python3,kivy==2.2.1,cython==0.29.33,yt-dlp,requests,sqlite3' buildozer.spec
          
          # 3. Setel ulang API dan Log Level biar stabil
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^android.sdk =.*/android.sdk = 33/' buildozer.spec
          sed -i 's/^log_level =.*/log_level = 2/' buildozer.spec
          
          # 4. Pastikan arsitektur cuma arm64-v8a buat HP modern
          sed -i 's/^android.archs =.*/android.archs = arm64-v8a/' buildozer.spec

      - name: Install Buildozer & Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          # Pakai 'yes' buat otomatis setuju lisensi SDK
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: MaelSpeed-V3-Final-APK
          path: bin/*.apk
          
