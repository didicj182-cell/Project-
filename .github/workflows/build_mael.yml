name: Build MaelSpeed V3 APK (Final Fix)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev

      - name: Extreme Auto-Fix Buildozer Spec
        run: |
          # 1. [span_3](start_span)[span_4](start_span)Hapus SEMUA baris requirements di seluruh file (biar gak ada duplikat)[span_3](end_span)[span_4](end_span)
          sed -i '/requirements =/d' buildozer.spec
          
          # 2. [span_5](start_span)Cari di mana section [buildozer] berada dan hapus sampai akhir file[span_5](end_span)
          # [span_6](start_span)Ini buat ngebuang baris 429 yang bikin error DuplicateOption[span_6](end_span)
          sed -i '/\[buildozer\]/,$d' buildozer.spec
          
          # 3. [span_7](start_span)Pasang requirements yang bener di bawah [app][span_7](end_span)
          sed -i '/\[app\]/a requirements = python3,kivy==2.2.1,cython==0.29.33,yt-dlp,requests,sqlite3' buildozer.spec
          
          # 4. [span_8](start_span)Setel ulang API dan Log Level agar stabil[span_8](end_span)
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^log_level =.*/log_level = 2/' buildozer.spec
          
          # 5. [span_9](start_span)Tulis ulang section [buildozer] yang bersih di paling bawah[span_9](end_span)
          echo -e "\n[buildozer]\nlog_level = 2\nwarn_on_root = 1" >> buildozer.spec

      - name: Install Buildozer & Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          # [span_10](start_span)Pakai 'yes' untuk otomatis menyetujui lisensi SDK[span_10](end_span)
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: MaelSpeed-V3-Final-APK
          path: bin/*.apk
          
