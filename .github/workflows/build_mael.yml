name: Build MaelSpeed V3 APK (Bore-Up Full Spek)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Tambahan libltdl-dev untuk fix error macro autoconf
          # Tambahan libffi-dev & libssl-dev untuk fitur download/internet
          sudo apt install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev zlib1g-dev libtool autoconf automake \
          pkg-config libltdl-dev libffi-dev libssl-dev

      - name: Extreme Auto-Fix Buildozer Spec
        run: |
          # 1. Hapus SEMUA baris requirements (biar gak ada duplikat di baris 429)
          sed -i '/requirements =/d' buildozer.spec
          
          # 2. Potong paksa section [buildozer] sampai akhir file
          sed -i '/\[buildozer\]/,$d' buildozer.spec
          
          # 3. Pasang ulang requirements yang bener di bawah [app]
          sed -i '/\[app\]/a requirements = python3,kivy==2.2.1,cython==0.29.33,yt-dlp,requests,sqlite3' buildozer.spec
          
          # 4. Setel API 33 agar stabil
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^log_level =.*/log_level = 2/' buildozer.spec
          
          # 5. Tulis ulang section [buildozer] yang bersih
          echo -e "\n[buildozer]\nlog_level = 2\nwarn_on_root = 1" >> buildozer.spec

      - name: Install Buildozer & Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          # 'yes' untuk otomatis setuju lisensi Android SDK
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: MaelSpeed-V3-Final-APK
          path: bin/*.apk
          
